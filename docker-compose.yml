services:
  backend:
    build: ./backend
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
